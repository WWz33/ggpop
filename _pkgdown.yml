url: https://wwz33.github.io/ggPopi/

template:
  package: tidytemplate
  bootstrap: 5
  includes:
    in_header: |
      <!-- Privacy-friendly analytics by Plausible -->
      <script async src="https://plausible.io/js/pa-kPp_Wsi8svrwXL8PWiqz-.js"></script>
      <script>
        window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
        plausible.init()
      </script>
      <script async src="https://widget.kapa.ai/kapa-widget.bundle.js"
      data-button-hide="true"
      data-modal-disclaimer="This is a custom LLM for answering questions about dplyr, tidyr, and ggplot2. Answers are based on the contents of the documentation. Rate the answers to let us know what you think!"
      data-modal-ask-ai-input-placeholder="Ask me a question about dplyr, tidyr, or ggplot2."
      data-modal-header-bg-color="#f9f9f9"
      data-modal-override-open-class="open-kapa-widget"
      data-project-color="#365a7a"
      data-project-name="dplyr"
      data-user-analytics-fingerprint-enabled="false"
      data-user-analytics-cookie-enabled="false"
      data-bot-protection-mechanism="hcaptcha"
      data-website-id="44ae76c6-2ae5-4899-ab42-de9f17f07c7b"
      ></script>

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github_user]
  components:
    github_user:
      icon: fa-github
      href: https://github.com/WWz33/ggPopi
      aria-label: GitHub repository

articles:
- title: Start Here
  navbar: ~
  contents:
  - ggpop
- title: Module Guides
  navbar: Guides
  contents:
  - guides/gwas
  - guides/pca
  - guides/admixture
  - guides/stats
  - guides/ld-decay
  - guides/selection
  - guides/introgression
  - guides/ne-history
  - guides/color-schemes
  - guides/full-extdata
- title: Advanced
  navbar: Advanced
  contents:
  - guides/compatibility

reference:
- title: Core Data Workflows
  desc: Import typed data and start tidy ggplot workflows.
  contents:
  - ggpop
  - import_gwas
  - import_pca
  - import_pop_group
  - import_admix
- title: GWAS Plots
  desc: Manhattan and Q-Q plots for GCTA, GEMMA, and EMMAX results.
  contents:
  - plot_manha
  - geom_manha
  - plot_qq
  - geom_qq
- title: PCA Plots
  desc: PLINK/GCTA imports and optional flashpcaR computation.
  contents:
  - plot_pca
  - geom_pca
  - compute_pca
- title: Admixture Plots
  desc: Narrow user-facing admixture plotting API.
  contents:
  - plot_admix
  - geom_admix
- title: Population Genomics Statistics
  desc: Windowed FST, pi, Tajima's D, and related statistics from pixy or vcftools.
  contents:
  - import_stats
  - plot_stats
  - geom_stats
- title: LD Decay
  desc: LD decay summaries from PopLDdecay and PLINK pairwise LD files.
  contents:
  - import_ld_decay
  - plot_ld_decay
  - geom_ld_decay
- title: Selective Sweep Scans
  desc: Selscan and XPCLR imports with chromosome and region plotting.
  contents:
  - import_selection
  - plot_selection
  - geom_selection
- title: Introgression
  desc: Dsuite, genomics_general, TreeMix-style, and qpGraph introgression plots.
  contents:
  - import_introgression
  - plot_introgression
  - geom_introgression
- title: Ne History
  desc: Effective population size histories from PSMC, MSMC2, SMC++, and Stairway Plot 2.
  contents:
  - import_ne_history
  - plot_ne_history
  - geom_ne_history
- title: Styling
  desc: Shared palettes, scales, and publication theme helpers.
  contents:
  - pop_palettes
  - new_pop_palette
  - ggpop_palette
  - scale_fill_ggpop
  - scale_colour_ggpop
  - scale_color_ggpop
  - theme_ggpop_publication
  - theme_tidyplot
  - adjust_font
- title: Advanced Compatibility
  desc: Exported integration hooks and original-package compatibility layers.
  contents:
  - ends_with("_pub")
  - plot_admixture_pophelper
  - as_pophelper_qlist
  - pophelper_compat
